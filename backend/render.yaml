databases:
  - name: selleriq-db
    plan: free
    databaseName: selleriq_pro
    user: selleriq_user

services:
  - type: web
    name: selleriq-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: selleriq-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://selleriq-pro.vercel.app
      - key: PYTHON_VERSION
        value: "3.11.6"
