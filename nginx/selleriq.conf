# ── SellerIQ Pro — Nginx Reverse Proxy Config ──────────────────
# Add this as a NEW server block in your existing Nginx config on the VPS
# Location: /etc/nginx/conf.d/selleriq.conf (inside sparta_mlm-nginx-1 container)
#
# OR if you have a shared nginx config, add this server block to it.

server {
    listen 80;
    server_name selleriq.yourdomain.com;    # ← CHANGE THIS to your actual domain/subdomain

    # Frontend — React SPA
    location / {
        proxy_pass http://selleriq-frontend-1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API — FastAPI
    location /api/ {
        proxy_pass http://selleriq-backend-1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeouts for large file uploads
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 100M;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://selleriq-backend-1:8001;
    }
}
